<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>EventTix - Secure Booking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Events</h2>
    <div class="d-flex gap-2">
        <a sec:authorize="hasRole('ADMIN')" href="/events/new" class="btn btn-success">+ New Event</a>

        <a sec:authorize="isAnonymous()" href="/login" class="btn btn-primary">Login to Book</a>
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
            <span class="text-muted small">Logged in as: <strong sec:authentication="name"></strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</div>

<div class="row">
    <div th:each="event : ${events}" class="col-md-4">
        <div class="card mb-4 shadow border-0">
            <div class="card-body">
                <h5 class="fw-bold" th:text="${event.name}"></h5>
                <p class="text-muted small" th:text="${event.location}"></p>
                <hr>
                <ul class="list-group list-group-flush">
                    <li th:each="ticket : ${event.tickets}" class="list-group-item d-flex justify-content-between align-items-center p-2">
                        <span th:text="${ticket.seatNumber}"></span>
                        <div>
                            <button th:if="${!ticket.sold}" class="btn btn-sm btn-primary"
                                    th:onclick="updateStatus([[${ticket.id}]], 'book')">Book</button>

                            <span th:if="${ticket.sold}" class="badge bg-secondary">Sold Out</span>

                            <button sec:authorize="hasRole('ADMIN')" th:if="${ticket.sold}"
                                    class="btn btn-sm btn-warning ms-1 text-white"
                                    th:onclick="updateStatus([[${ticket.id}]], 'cancel')">Release</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function updateStatus(id, action) {
        fetch(`/api/tickets/${id}/${action}`, {
            method: 'PUT'
        })
        .then(response => {
            if (response.ok) {
                location.reload();
            } else if (response.status === 401 || response.status === 403) {
                // Redirect unauthorized users to login page
                window.location.href = '/login';
            } else {
                alert("Unexpected error: " + response.status);
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>
</body>
</html>
