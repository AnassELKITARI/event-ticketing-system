<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create New Event</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Host a New Event</h2>
        <form th:action="@{/events}" th:object="${event}" method="post" class="card p-4 shadow">
            <div class="mb-3">
                <label class="form-label fw-bold">Event Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Location</label>
                <input type="text" th:field="*{location}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Date and Time</label>
                <input type="datetime-local" th:field="*{eventDate}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Number of Seats</label>
                <input type="number" th:field="*{initialTicketCount}" class="form-control" min="1" max="100" placeholder="e.g. 20">
                <div class="form-text">This will automatically generate tickets for the event.</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="2"></textarea>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Publish Event</button>
                <a href="/events" class="btn btn-light">Back to List</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
